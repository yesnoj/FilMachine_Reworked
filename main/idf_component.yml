dependencies:
  lvgl/lvgl: "~9.2.0"

  # ── Display drivers (one active per board) ──
  atanisoft/esp_lcd_ili9488: "*"           # Makerfabs S3: ILI9488 parallel 16-bit
  eric-c-e/esp_lcd_nv3041: "*"            # JC4827W543:  NV3041A QSPI

  # ── Touch drivers (one active per board) ──
  espressif/esp_lcd_touch_ft5x06: "*"     # Makerfabs S3: FT6236 capacitive
  espressif/esp_lcd_touch_gt911: "*"      # JC4827W543:  GT911 capacitive

  # ── Networking ──
  espressif/mdns: "*"

  # ── Wi-Fi via ESP32-C6 companion chip (ESP-Hosted SDIO) ──
  # Required for ESP32-P4 which has no native Wi-Fi.
  # The esp_hosted component provides the SDIO transport layer,
  # and esp_wifi_remote wraps the standard esp_wifi API over it.
  espressif/esp_hosted: "*"
  espressif/esp_wifi_remote: "*"
