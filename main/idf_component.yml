dependencies:
  lvgl/lvgl: "~9.5.0"

  # ── Touch driver ──
  espressif/esp_lcd_touch_gt911: "*"      # GT911 capacitive

  # ── Networking ──
  espressif/mdns: "*"

  # ── Wi-Fi via ESP32-C6 companion chip (ESP-Hosted SDIO) ──
  # Required for ESP32-P4 which has no native Wi-Fi.
  # The esp_hosted component provides the SDIO transport layer,
  # and esp_wifi_remote wraps the standard esp_wifi API over it.
  espressif/esp_hosted: "*"
  espressif/esp_wifi_remote: "*"
